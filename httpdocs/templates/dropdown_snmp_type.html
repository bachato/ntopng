{% local safe_id = (id or ""):gsub("%s+", "_") %}
<div class="form-group mb-3">
  <label class="{* label_class or "" *}" for="{* safe_id *}">{* label or "" *}</label> {* icon or "" *}
  <select id="{* safe_id *}" name="{* safe_id *}" class="form-select">
    {% for _, opt in ipairs(options) do %}
      <option value="{* opt.value *}" {% if opt.value == value then %}selected{% end %}>
        {{ opt.label }}
      </option>
    {% end %}
  </select>
</div>
